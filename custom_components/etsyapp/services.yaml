# Etsy Shop Services

refresh_data:
  name: Refresh Shop Data
  description: Manually refresh all Etsy shop data from the API
  fields: {}

get_shop_stats:
  name: Get Shop Statistics
  description: Retrieve current shop statistics with optional listings and transactions
  fields:
    include_listings:
      name: Include Listings
      description: Include recent listings in the response
      default: true
      required: false
      selector:
        boolean:
    include_transactions:
      name: Include Transactions
      description: Include recent transactions in the response
      default: true
      required: false
      selector:
        boolean:

fire_test_event:
  name: Fire Test Event
  description: Fire a test event to verify automations and triggers without waiting for a real order
  fields:
    event_type:
      name: Event Type
      description: The type of event to simulate
      default: new_order
      required: false
      selector:
        select:
          options:
            - label: New Order
              value: new_order
            - label: New Review
              value: new_review
            - label: Low Stock
              value: low_stock